name: Deploy to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/golf-backend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/golf-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/golf-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/golf-frontend:latest
          build-args: |
            VITE_API_URL=https://api.jouwgolftrainer.com/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Extract image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Install cloudflared
        run: |
          curl -sL --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host ssh.jouwgolftrainer.com\n  ProxyCommand cloudflared access ssh --hostname %%h\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' > ~/.ssh/config

      - name: Copy files to server
        env:
          CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          scp -r docker-compose.prod.yml nginx/ \
            ${{ secrets.DROPLET_USER }}@ssh.jouwgolftrainer.com:/app/golf/

      - name: Deploy on server
        env:
          CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          ssh ${{ secrets.DROPLET_USER }}@ssh.jouwgolftrainer.com bash -s << EOF
          cd /app/golf
          export REGISTRY="${REGISTRY}"
          export IMAGE_TAG="${IMAGE_TAG}"

          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          docker image prune -f
          echo "Deploy complete: ${IMAGE_TAG}"
          EOF
